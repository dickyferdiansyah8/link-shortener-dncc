version: '3.8'
services:
  app:
    image: dikidian/link-shortener:latest
    container_name: laravel-app
    restart: unless-stopped
    networks:
      - dncc-network

  nginx:
    image: nginx:alpine
    container_name: nginx-server
    restart: unless-stopped
    ports:
      - "8020:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - dncc-network

networks:
  dncc-network:
    driver: bridge
