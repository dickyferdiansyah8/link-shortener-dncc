version: '3.8'
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: dikidian/link-shortener:latest
    container_name: laravel-app
    restart: unless-stopped
    volumes:
      - .:/var/www
    networks:
      - dncc-network

  nginx:
    image: nginx:alpine
    container_name: nginx-server
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - dncc-network

networks:
  dncc-network:
    driver: bridge
